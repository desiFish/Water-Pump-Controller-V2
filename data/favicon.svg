<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .gear { fill: #667eea; }
    </style>
  </defs>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#764ba2" stroke-width="2"/>
  <g class="gear">
    <!-- Center circle -->
    <circle cx="50" cy="50" r="15"/>
    <!-- Gear teeth -->
    <rect x="47" y="8" width="6" height="12" rx="2"/>
    <rect x="47" y="80" width="6" height="12" rx="2"/>
    <rect x="8" y="47" width="12" height="6" rx="2"/>
    <rect x="80" y="47" width="12" height="6" rx="2"/>
    <!-- Diagonal teeth -->
    <g transform="translate(50, 50) rotate(45)">
      <rect x="33" y="-3" width="12" height="6" rx="2"/>
      <rect x="-45" y="-3" width="12" height="6" rx="2"/>
    </g>
    <g transform="translate(50, 50) rotate(-45)">
      <rect x="33" y="-3" width="12" height="6" rx="2"/>
      <rect x="-45" y="-3" width="12" height="6" rx="2"/>
    </g>
  </g>
</svg>